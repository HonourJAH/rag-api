# .github/workflows/ci.yml
name: RAG API CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  # ─── Job 1: Run Tests ───────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Cache pip dependencies so they don't reinstall on every run
      # Cache key changes only when requirements.txt changes
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Cache the sentence-transformer model so it isn't downloaded on every run
      # The model is ~90MB — caching saves significant CI time
      - name: Cache sentence-transformer model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-all-MiniLM-L6-v2
          restore-keys: |
            ${{ runner.os }}-hf-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest test/ -v --tb=short

      - name: Show test coverage
        run: pytest test/ --cov=app --cov-report=term-missing --tb=short

  # ─── Job 2: Build & Verify Docker Image ─────────────────────────────────────
  # Only runs if tests pass
  docker-build:
    runs-on: ubuntu-latest
    needs: test

    services:
      qdrant:
        image: qdrant/qdrant
        ports:
          - 6333:6333

    steps:
      - uses: actions/checkout@v4

      # Cache Docker layers so repeated builds are fast
      # Each layer is cached separately — only changed layers rebuild
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true              # don't push — just verify it builds correctly
          tags: rag-api:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      # Prevents cache from growing indefinitely across runs
      - name: Move Docker cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Run container
        run: |
          docker run -d \
            --name rag-api \
            -p 8000:8000 \
            --add-host=host.docker.internal:host-gateway \
            -e QDRANT_HOST=host.docker.internal \
            -e OLLAMA_URL=http://localhost:11434/api/generate \
            rag-api:latest

      - name: Wait for API to start
        run: sleep 60

      - name: Show container logs
        if: always()
        run: docker logs rag-api --tail 30

      - name: Check container is running
        run: docker ps | grep rag-api

      - name: Health check
        run: curl --fail http://localhost:8000/health

      - name: Show container logs on failure
        if: failure()
        run: docker logs rag-api --tail 50
