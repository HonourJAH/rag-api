# docker-compose.yml
# Runs the RAG API and Qdrant together
# Ollama must be running separately on the host machine

services:

  # ─── Qdrant Vector Database ──────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant
    container_name: qdrant
    ports:
      - "${QDRANT_PORT}:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/6333"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── RAG API ─────────────────────────────────────────────────────────────
  rag-api:
    build: .
    container_name: rag-api
    ports:
      - "8000:8000"
    environment:
      # Point to the qdrant service by its container name
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=${QDRANT_PORT}
      # Point to Ollama running on the host machine
      # host.docker.internal resolves to the host on Linux/macOS/Windows
      - OLLAMA_URL=http://host.docker.internal:11434/api/generate
      - OLLAMA_MODEL=${OLLAMA_MODEL}
    depends_on:
      qdrant:
        condition: service_healthy  # wait for Qdrant to be ready before starting
    restart: unless-stopped

volumes:
  qdrant_storage:
